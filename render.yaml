services:
  - type: web
    name: alumni-frontend
    env: static
    buildCommand: bash build.sh
    staticPublishPath: build/web
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: API_URL
        value: https://alumni-backend-9qt9.onrender.com
